<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
   <meta name="description" content="Cartographie de mes lieux visités">
   <link rel="stylesheet" href="/css/style.css">
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
   <meta property="og:locale" content="fr_FR" />
   <meta property="og:site_name" content="{{ page.title }} | Mes lieux">
   <meta property="og:image" content="/cover.jpg"/>
   <meta property="og:description" content="{{ page.tags-preview }}" />
   <meta property="og:url" content="{{ page.url }}">
   <meta name="fediverse:creator" content="@timothee@mastodon.design" />
   <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
   <script src="/assets/script.js"></script>
   <script>
   window.searchData = {
      places:  [{% for place in site.places %}{"title":{{ place.title | jsonify }},"url":{{ place.url | jsonify }}}{% unless forloop.last %},{% endunless %}{% endfor %}],
      voyages: [{% for voyage in site.voyages %}{"title":{{ voyage.title | jsonify }},"url":{{ voyage.url | jsonify }}}{% unless forloop.last %},{% endunless %}{% endfor %}]
   };
   </script>
</head>
<body>
   {{ content }}

   <!-- MODALE DE RECHERCHE MOBILE -->
   <div class="search-modal-backdrop" id="search-modal-backdrop" aria-hidden="true"></div>

   <div class="search-modal"
        id="search-modal"
        role="dialog"
        aria-modal="true"
        aria-label="Rechercher un lieu">

      <div class="sheet-header search-modal-header">
         <div class="search-modal-field">
            <svg class="search-modal-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
               <circle cx="11" cy="11" r="8" stroke-width="2" stroke="currentColor"/>
               <path d="m21 21-4.35-4.35" stroke-width="2" stroke="currentColor" stroke-linecap="round"/>
            </svg>
            <input type="text"
                   id="search-input-modal"
                   placeholder="Rechercher un lieu…"
                   autocomplete="off"
                   autocorrect="off"
                   spellcheck="false"
                   aria-label="Rechercher un lieu">
            <button class="search-modal-clear"
                    id="search-modal-clear"
                    type="button"
                    aria-label="Effacer la recherche"
                    style="display:none">✕</button>
         </div>
         <button class="sheet-close"
                 id="search-modal-cancel"
                 type="button"
                 aria-label="Fermer la recherche">✕</button>
      </div>

      <div class="search-modal-body">
         <ul class="search-suggestions" id="search-suggestions" role="listbox" aria-label="Suggestions"></ul>
      </div>

   </div>
</body>
</html>
